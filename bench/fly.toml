app = 'turbograph-bench'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[build.settings]
  context = "../../"

[mounts]
  source = "bench_data"
  destination = "/data"

[env]
  BENCH_PERSONS = "1000000"
  BUFFER_POOL_MB = "1024"

[[vm]]
  memory = '8gb'
  cpu_kind = 'performance'
  cpus = 4
